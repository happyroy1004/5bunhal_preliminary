<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>치과 증례 기록 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
  
  <header class="top-nav">
    <div class="nav-brand">🦷 치과 증례 기록</div>
    <div class="nav-user">
      <span id="navUserName">원장</span> 님
      <button id="logoutBtn" class="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="dashboard-container">
    <div class="dashboard-card">
      <h2 class="greeting-title"><span id="greetingName">원장</span> 님의 증례 목록입니다.</h2>
      
      <div class="info-banner" id="workspaceBanner">
        <div class="banner-text">
          <span>📁</span>
          <span id="workspaceStatus">보안을 위해 PC의 '로컬 작업 폴더'를 선택해야 데이터를 불러올 수 있습니다.</span>
        </div>
        <div class="banner-actions">
          <button id="selectFolderBtn" class="btn-primary">작업 폴더 선택 (필수)</button>
        </div>
      </div>

      <div class="toolbar" style="opacity: 0.5; pointer-events: none;" id="mainToolbar">
        <input type="text" id="searchPatient" class="search-input" placeholder="환자명 또는 진료번호 검색...">
        
        <div class="tag-filter">
          <label>태그:</label>
          <select id="tagSelect" class="custom-select">
            <option value="all">전체</option>
            </select>
        </div>
        
        <button id="addPatientBtn" class="btn-success">+ 새 환자 등록</button>
      </div>

      <section id="patientList" class="patient-grid">
        <div class="empty-state">
          <div class="clipboard-icon">🔒</div>
          <h3>작업 폴더를 먼저 선택해주세요.</h3>
        </div>
      </section>
      
    </div>
  </main>

  <div id="addPatientModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>새 환자 등록</h3>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>
      <form id="addPatientForm">
        <div class="input-group">
          <label for="patientName">환자명 (필수)</label>
          <input type="text" id="patientName" required placeholder="예: 홍길동">
        </div>
        
        <div class="input-group">
          <label for="chartNumber">진료번호 (필수)</label>
          <input type="text" id="chartNumber" required placeholder="예: 2026-001">
        </div>

        <div class="two-col-group">
          <div class="input-group">
            <label for="patientGender">성별 (선택)</label>
            <select id="patientGender" class="custom-select" style="width: 100%;">
              <option value="">선택안함</option>
              <option value="남성">남성</option>
              <option value="여성">여성</option>
            </select>
          </div>
          <div class="input-group">
            <label for="patientAge">나이 (선택)</label>
            <input type="number" id="patientAge" placeholder="예: 45">
          </div>
        </div>

        <div class="input-group">
          <label for="patientTags">태그 (쉼표로 자유롭게 생성)</label>
          <input type="text" id="patientTags" placeholder="예: 고지혈증, 임플란트, 신경치료">
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelBtn">취소</button>
          <button type="submit" class="btn-success">환자 등록 및 폴더 생성</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
