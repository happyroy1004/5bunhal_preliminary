<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>치과 증례 기록 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
  <header class="top-nav">
    <div class="nav-brand">🦷 치과 증례 기록</div>
    <div class="nav-user">
      <span id="navUserName">원장</span> 님
      <button id="logoutBtn" class="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="dashboard-container">
    <div class="dashboard-card">
      
      <div id="patientListSection">
        <h2 class="greeting-title"><span id="greetingName">원장</span> 님의 증례 목록입니다.</h2>
        <div class="info-banner" id="workspaceBanner">
          <div>📁 보안을 위해 PC의 <b>'로컬 작업 폴더'</b>를 선택해야 데이터를 불러올 수 있습니다.</div>
          <button id="selectFolderBtn" class="btn-primary">작업 폴더 선택</button>
        </div>
        <div class="toolbar" style="opacity: 0.5; pointer-events: none;" id="mainToolbar">
          <input type="text" id="searchPatient" class="search-input" placeholder="환자명 검색...">
          <div class="tag-filter">
            <label>태그:</label>
            <select id="tagSelect" class="custom-select"><option value="all">전체</option></select>
          </div>
          <button id="addPatientBtn" class="btn-success">+ 새 환자 등록</button>
        </div>
        <section id="patientList" class="patient-grid">
          <div style="text-align: center; grid-column: 1/-1; color: #64748B; padding: 50px;">작업 폴더를 먼저 선택해주세요.</div>
        </section>
      </div>

      <div id="patientDetailSection" style="display: none;">
        <button id="backToListBtn" class="btn-secondary" style="margin-bottom: 20px;">← 목록으로 돌아가기</button>
        
        <div class="detail-header">
          <div>
            <div class="detail-title" id="detailPatientName">환자명</div>
            <div style="color: #64748B;" id="detailChartNo">진료번호: -</div>
            <div id="detailTags" style="margin-top: 10px;"></div>
          </div>
          <button id="addRecordBtn" class="btn-success">+ 새 증례(사진) 기록</button>
        </div>

        <h3 style="margin-top:30px;">치료 타임라인</h3>
        <div class="timeline-bar" id="timelineBar">
           </div>

        <div class="record-toolbar">
          <h3 id="currentRecordDate">날짜를 선택하세요</h3>
          <button id="toggle5SplitBtn" class="btn-primary">5분할 모드 OFF</button>
        </div>
        
        <div id="photoViewerArea" class="image-grid"></div>

        <div class="memo-box">
          <h4>📝 메모</h4>
          <p id="currentRecordMemo">등록된 메모가 없습니다.</p>
        </div>
      </div>

    </div>
  </main>

  <div id="addPatientModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>새 환자 등록</h3>
        <button class="close-btn" id="closePatientModalBtn">&times;</button>
      </div>
      <form id="addPatientForm">
        <div class="input-group">
          <label>환자명 (필수)</label>
          <input type="text" id="patientName" required>
        </div>
        <div class="input-group">
          <label>진료번호 (필수)</label>
          <input type="text" id="chartNumber" required>
        </div>
        <div class="input-group">
          <label>태그 (쉼표로 구분)</label>
          <input type="text" id="patientTags" placeholder="예: 고혈압, 당뇨">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelPatientBtn">취소</button>
          <button type="submit" class="btn-success">등록 및 폴더 생성</button>
        </div>
      </form>
    </div>
  </div>

  <div id="addRecordModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>새 임상 사진 기록</h3>
        <button class="close-btn" id="closeRecordModalBtn">&times;</button>
      </div>
      <form id="addRecordForm">
        <div class="input-group">
          <label>진료 날짜</label>
          <input type="date" id="recordDate" required>
        </div>
        <div class="input-group">
          <label>사진 첨부 (드래그 가능, 다중 선택)</label>
          <input type="file" id="recordPhotos" accept="image/*" multiple required>
        </div>
        <div class="input-group">
          <label>메모</label>
          <input type="text" id="recordMemo" placeholder="예: #23 치아 수복">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelRecordBtn">취소</button>
          <button type="submit" class="btn-success">로컬 폴더에 사진 저장</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
