<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>치과 증례 기록 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
  
  <header class="top-nav">
    <div class="nav-brand">🦷 치과 증례 기록</div>
    <div class="nav-user">
      <span id="navUserName">원장</span> 님
      <button id="logoutBtn" class="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="dashboard-container">
    <div class="dashboard-card">
      
      <!-- [1] 환자 목록 섹션 -->
      <div id="patientListSection">
        <h2 class="greeting-title"><span id="greetingName">원장</span> 님의 증례 목록입니다.</h2>
        
        <div class="info-banner" id="workspaceBanner">
          <div class="banner-text">
            <span>📁</span>
            <span id="workspaceStatus">보안을 위해 PC의 <b>'로컬 작업 폴더'</b>를 선택해야 데이터를 불러올 수 있습니다.</span>
          </div>
          <div class="banner-actions">
            <button id="selectFolderBtn" class="btn-primary">작업 폴더 선택 (필수)</button>
          </div>
        </div>

        <div class="toolbar" style="opacity: 0.5; pointer-events: none; flex-wrap: wrap; gap: 15px;" id="mainToolbar">
          <!-- 검색창 (실시간 연동) -->
          <input type="text" id="searchPatient" class="search-input" placeholder="🔍 환자명 또는 진료번호 검색..." style="width: 300px;">
          
          <!-- 다중 태그 필터 (드롭다운 대신 칩 형태) -->
          <div class="tag-filter-container" id="tagFilterContainer">
            <!-- JS에서 동적으로 버튼 생성 -->
          </div>
          
          <button id="addPatientBtn" class="btn-success" style="margin-left: auto;">+ 새 환자 등록</button>
        </div>

        <section id="patientList" class="patient-grid">
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="clipboard-icon">🔒</div>
            <h3>작업 폴더를 먼저 선택해주세요.</h3>
          </div>
        </section>
      </div>

      <!-- [2] 임상 사진 상세 섹션 -->
      <div id="patientDetailSection" style="display: none;">
        <button id="backToListBtn" class="btn-secondary" style="margin-bottom: 20px;">← 목록으로 돌아가기</button>
        
        <div class="detail-header">
          <div>
            <div class="detail-title" id="detailPatientName">환자명</div>
            <div style="color: #64748B; font-size: 14px; margin-top: 5px;" id="detailChartNo">진료번호: -</div>
            <div id="detailTags" style="margin-top: 10px;"></div>
          </div>
          <div style="display: flex; gap: 10px;">
            <button id="editPatientBtn" class="btn-secondary">환자 정보 수정</button>
            <button id="addRecordBtn" class="btn-success">+ 새 증례(사진) 추가</button>
          </div>
        </div>

        <h3 style="margin-top: 30px; margin-bottom: 15px; color: var(--btn-navy);">치료 타임라인</h3>
        <div class="timeline-bar" id="timelineBar"></div>

        <div class="record-toolbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 id="currentRecordDate" style="color: var(--text-dark);">날짜를 선택하세요</h3>
          <button id="toggle5SplitBtn" class="btn-primary">5분할 모드 OFF</button>
        </div>
        
        <div id="photoViewerArea" class="image-grid"></div>

        <!-- 메모 기능 활성화 영역 -->
        <div class="memo-box">
          <div class="memo-header-flex">
            <h4 style="color: var(--btn-navy); margin: 0;">📝 메모</h4>
            <button id="saveMemoBtn" class="btn-primary" style="padding: 6px 12px; font-size: 12px;">메모 저장</button>
          </div>
          <textarea id="currentRecordMemo" class="memo-textarea" placeholder="이 증례에 대한 메모를 입력하세요..."></textarea>
        </div>
      </div>

    </div>
  </main>

  <!-- [모달] 새 환자 등록 -->
  <div id="addPatientModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>새 환자 등록</h3>
        <button class="close-btn" id="closePatientModalBtn">&times;</button>
      </div>
      <form id="addPatientForm">
        <div class="two-col-group">
          <div class="input-group">
            <label>환자명 (필수)</label><input type="text" id="patientName" required>
          </div>
          <div class="input-group">
            <label>진료번호 (필수)</label><input type="text" id="chartNumber" required>
          </div>
        </div>
        <div class="input-group">
          <label>초진 날짜</label><input type="date" id="initialVisitDate" required>
        </div>
        <div class="input-group">
          <label>태그 (쉼표로 구분하여 무한 생성)</label>
          <input type="text" id="patientTags" placeholder="예: 고혈압, 당뇨, 발치">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelPatientBtn">취소</button>
          <button type="submit" class="btn-success">환자 등록 및 폴더 생성</button>
        </div>
      </form>
    </div>
  </div>

  <!-- [모달] 환자 정보 수정 (초진일 변경 가능) -->
  <div id="editPatientModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>환자 정보 수정</h3>
        <button class="close-btn" id="closeEditPatientBtn">&times;</button>
      </div>
      <form id="editPatientForm">
        <div class="two-col-group">
          <div class="input-group">
            <label>환자명</label><input type="text" id="editPatientName" required>
          </div>
          <div class="input-group">
            <label>진료번호</label><input type="text" id="editChartNumber" disabled style="background:#eee;">
          </div>
        </div>
        <div class="input-group">
          <label>초진 날짜 (수정 가능)</label>
          <input type="date" id="editInitialVisitDate" required>
        </div>
        <div class="input-group">
          <label>태그 (쉼표로 구분)</label>
          <input type="text" id="editPatientTags">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelEditPatientBtn">취소</button>
          <button type="submit" class="btn-success">정보 저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- [모달] 새 증례 사진 기록 추가 -->
  <div id="addRecordModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>새 임상 사진 기록</h3>
        <button class="close-btn" id="closeRecordModalBtn">&times;</button>
      </div>
      <form id="addRecordForm">
        <div class="input-group">
          <label>사진 첨부 (드래그 가능, 다중 선택)</label>
          <input type="file" id="recordPhotos" accept="image/*" multiple required>
          <p style="font-size: 11px; color: var(--text-gray); margin-top: 4px;">가장 오래된 원본 생성일이 진료 날짜로 자동 설정됩니다.</p>
        </div>
        <div class="input-group">
          <label>진료 날짜</label><input type="date" id="recordDate" required>
        </div>
        <div class="input-group">
          <label>간단 메모</label>
          <input type="text" id="recordMemo" placeholder="예: #23 치아 수복">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelRecordBtn">취소</button>
          <button type="submit" class="btn-success">로컬 폴더에 저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- [모달] 커스텀 시스템 알림창 -->
  <div id="customAlertModal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <div class="modal-header" style="justify-content: center; border-bottom: none; padding-bottom: 0;">
        <h3 style="color: var(--btn-navy);">알림</h3>
      </div>
      <div id="alertMessage" style="padding: 20px 0; font-size: 15px; color: var(--text-dark); line-height: 1.6;"></div>
      <div class="modal-footer" style="justify-content: center; border-top: none;">
        <button class="btn-primary" id="closeAlertBtn" style="width: 100%;">확인</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
