<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>치과 증례 기록 시스템 - 로그인</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>치과 증례 기록 시스템</h1>
        <p class="subtitle">Dental Case Management System</p>
      </div>
      
      <form id="loginForm" class="login-form">
        <div class="input-group">
          <label for="loginEmail">아이디</label>
          <input 
            type="email" 
            id="loginEmail" 
            placeholder="이메일을 입력하세요"
            autocomplete="email"
            required
          >
        </div>
        
        <div class="input-group">
          <label for="loginPw">비밀번호</label>
          <input 
            type="password" 
            id="loginPw" 
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
            required
          >
        </div>
        
        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="rememberMe">
            <span>아이디 저장</span>
          </label>
        </div>
        
        <button type="submit" id="loginBtn" class="btn-primary">로그인</button>
        
        <div class="login-footer">
          <p>계정이 없으신가요? <a href="#" id="signUpLink">회원가입</a></p>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
