<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>치과 증례 기록 시스템 - 로그인</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    
    <div class="login-box" id="loginBox">
      <div class="login-header">
        <h1>🦷 치과 증례 기록 시스템</h1>
        <p class="subtitle">Dental Case Management System</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="input-group">
          <label for="loginEmail">아이디 (이메일)</label>
          <input type="email" id="loginEmail" placeholder="이메일을 입력하세요" required>
        </div>
        <div class="input-group">
          <label for="loginPw">비밀번호</label>
          <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요" required>
        </div>
        <div class="checkbox-group">
          <label><input type="checkbox" id="rememberMe"><span>아이디 저장</span></label>
        </div>
        <button type="submit" id="loginBtn" class="btn-primary login-btn-color">로그인</button>
        <div class="login-footer">
          <p>계정이 없으신가요? <a href="#" id="showSignUpBtn">회원가입</a></p>
        </div>
      </form>
    </div>

    <div class="login-box" id="signUpBox" style="display: none;">
      <div class="login-header">
        <h1>새 계정 만들기</h1>
        <p class="subtitle">환영합니다! 정보를 입력해주세요.</p>
      </div>
      <form id="signUpForm" class="login-form">
        <div class="input-group">
          <label for="signUpName">사용자 이름 (원장님 성함)</label>
          <input type="text" id="signUpName" placeholder="예: 홍길동" required>
        </div>
        <div class="input-group">
          <label for="signUpEmail">이메일</label>
          <input type="email" id="signUpEmail" placeholder="사용할 이메일" required>
        </div>
        <div class="input-group">
          <label for="signUpPw">비밀번호 (6자리 이상)</label>
          <input type="password" id="signUpPw" placeholder="비밀번호" required minlength="6">
        </div>
        <button type="submit" id="submitSignUpBtn" class="btn-primary login-btn-color">가입하기</button>
        <div class="login-footer">
          <p>이미 계정이 있으신가요? <a href="#" id="showLoginBtn">로그인으로 돌아가기</a></p>
        </div>
      </form>
    </div>

  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
